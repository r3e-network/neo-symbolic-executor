name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x

      - name: Restore
        run: dotnet restore Neo.SymbolicExecutor.sln

      - name: Build (Release)
        run: dotnet build Neo.SymbolicExecutor.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/Neo.SymbolicExecutor.Tests/Neo.SymbolicExecutor.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

      - name: Smoke fuzz (60 seconds)
        run: |
          src/Neo.SymbolicExecutor.Fuzzer/bin/Release/net10.0/neo-sym-fuzz \
            --seconds 60 --workers 2 --corpus ./fuzz-corpus
        # Exit code 1 if any unique crash recorded — CI fails.

      - name: Upload fuzz corpus on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-corpus
          path: fuzz-corpus/
          retention-days: 14
